name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # Memungkinkan trigger manual dari GitHub Actions UI
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Bikin identitas git sementara
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Pindah ke branch sementara khusus untuk deploy HF
          git checkout -b deploy-hf
          
          # Hapus file notebook dari tracking (cuma di action ini, di repo asli aman)
          git rm -r --cached notebooks/ || true
          git rm --cached *.ipynb || true
          git commit -m "Remove large notebook files for Hugging Face deploy" || true
          
          # Push branch sementara ini ke branch main di Hugging Face
          git push --force https://ardavv:$HF_TOKEN@huggingface.co/spaces/ardavv/churn-prediction-olist deploy-hf:main
